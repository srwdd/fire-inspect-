<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语音诊断</title>
<style>
body{font-family:sans-serif;padding:16px;background:#f5f5f5}
.card{background:#fff;border-radius:8px;padding:16px;margin:8px 0;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.pass{color:#52c41a} .fail{color:#ff4d4f}
.btn{padding:12px 24px;border:none;border-radius:8px;font-size:15px;margin:4px;cursor:pointer}
.btn-go{background:#1890ff;color:#fff}
pre{background:#1a1a2e;color:#0f0;padding:12px;border-radius:6px;font-size:11px;overflow-x:auto;white-space:pre-wrap}
</style>
</head>
<body>
<h2>语音功能诊断</h2>

<div class="card">
  <b>浏览器信息</b>
  <pre id="ua"></pre>
</div>

<div class="card">
  <b>API 检测</b>
  <div id="api"></div>
</div>

<div class="card">
  <b>权限状态</b>
  <div id="perm"></div>
</div>

<div class="card">
  <b>实际测试</b>
  <button class="btn btn-go" onclick="testMic()">测试麦克风</button>
  <div id="result" style="margin-top:8px"></div>
</div>

<script>
document.getElementById('ua').textContent = navigator.userAgent;

var apiDiv = document.getElementById('api');
var checks = [
  ['navigator.mediaDevices', !!navigator.mediaDevices],
  ['getUserMedia', !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)],
  ['MediaRecorder', typeof MediaRecorder !== 'undefined'],
  ['location.protocol', location.protocol],
  ['location.hostname', location.hostname],
  ['isSecureContext', window.isSecureContext]
];
var html = '';
checks.forEach(function(c) {
  html += '<div class="' + (c[1] ? 'pass' : 'fail') + '">' + (c[1] ? 'OK' : 'FAIL') + ' ' + c[0] + ' = ' + c[1] + '</div>';
});
apiDiv.innerHTML = html;

var permDiv = document.getElementById('perm');
if (navigator.permissions && navigator.permissions.query) {
  navigator.permissions.query({name:'microphone'}).then(function(s) {
    permDiv.innerHTML = 'permissions.query = <b>' + s.state + '</b>';
  }).catch(function(e) {
    permDiv.innerHTML = 'permissions.query = FAIL: ' + e.message;
  });
} else {
  permDiv.innerHTML = 'permissions API not available';
}

function testMic() {
  var r = document.getElementById('result');
  r.innerHTML = 'Requesting microphone...';
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream) {
    stream.getTracks().forEach(function(t){t.stop();});
    r.innerHTML = '<span class="pass">OK! Microphone works!</span>';
  }).catch(function(e) {
    r.innerHTML = '<span class="fail">Error: ' + e.name + '<br>Message: ' + e.message + '</span>';
  });
}
</script>
</body>
</html>
